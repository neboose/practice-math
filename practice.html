<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="styles.css" rel="stylesheet">
        <link href="practice.css" rel="stylesheet">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const question = document.getElementById("question");
                const form = document.getElementById("form");
                const answer = document.getElementById("answer");
                let correct_answer;
                const lesson = new URLSearchParams(window.location.search).get("l");
                function startQuestions() {
                    newQuestion();
                    form.addEventListener("submit", function(event) {
                        event.preventDefault();
                        newQuestion();
                    });
                }
                switch(lesson)
                {
                    case "1.2": {
                        function newQuestion() {
                            question.innerHTML = "Is 1/2 and 2/4 equivalent? (y/n)";
                            correct_answer = "y";
                        }
                        break;
                    }
                    case "1.3": { 
                        function newQuestion() {
                            question.innerHTML = "Fill in the blank: 1/2 is equal to _/4";
                            correct_answer = "2";
                        }
                        break;
                    }
                    case "2.3": { 
                        function newQuestion() {
                            question.innerHTML = "Fill in the blank: 3/2 is equal to _/4";
                            correct_answer = "6";
                        }
                        break;
                    }
                }
                startQuestions();
            });
        </script>
        <title>Practice Math</title>
    </head>

    <body>
        <header>
            <h1>Practice</h1>
        </header>
        <div id="question"></div>
        <form id="form">
            <input id="answer">
        </form>
    </body>
</html>
